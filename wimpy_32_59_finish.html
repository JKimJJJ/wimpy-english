<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wimpy Kid 구동사 — p.32–59</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5c842">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;
  --card-bg:#ffffff;
  --dark:#1a1d2e;
  --yellow:#f5c842;
  --red:#e63946;
  --green:#52b788;
  --blue:#4361ee;
  --text:#1a1d2e;
  --muted:#888;
  --border:#e0dbd0;
  --correct-bg:#eaf3de;--correct:#27500a;
  --wrong-bg:#fcebeb;--wrong:#501313;
}
body{background:var(--bg);font-family:'Nanum Gothic',sans-serif;min-height:100vh;padding:20px 16px 60px;}
#app{max-width:480px;margin:0 auto;}

/* HEADER */
.header{text-align:center;margin-bottom:24px;padding:20px 16px;background:var(--dark);border-radius:20px;}
.header h1{font-family:'Bangers',cursive;font-size:1.7rem;color:var(--yellow);letter-spacing:2px;}
.header p{font-size:0.72rem;color:rgba(255,255,255,0.35);margin-top:4px;}

/* MODE TABS */
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.tab{flex:1;min-width:64px;padding:10px 6px;border-radius:12px;border:1.5px solid var(--border);background:var(--card-bg);color:var(--muted);font-family:'Nanum Gothic',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;position:relative;}
.tab.active{background:var(--dark);color:var(--yellow);border-color:var(--dark);}
.tab-badge{position:absolute;top:-6px;right:-6px;background:var(--wrong);color:#fff;font-size:0.62rem;font-weight:800;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;}

/* PROGRESS */
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.prog-label{font-size:0.72rem;font-weight:700;color:var(--muted);}
.prog-bar{height:5px;background:var(--border);border-radius:3px;margin-bottom:18px;overflow:hidden;}
.prog-fill{height:100%;background:var(--red);border-radius:3px;transition:width .35s;}

/* FLASHCARD */
.card-scene{perspective:1000px;height:230px;cursor:pointer;margin-bottom:14px;user-select:none;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1);}
.card-inner.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;backface-visibility:hidden;background:var(--card-bg);border-radius:20px;border:1.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 24px;gap:8px;}
.card-back{transform:rotateY(180deg);}
.card-num{font-family:'Bangers',cursive;font-size:1.1rem;color:var(--yellow);background:var(--dark);padding:2px 10px;border-radius:20px;position:absolute;top:14px;left:16px;}
.card-page{font-size:0.68rem;color:var(--muted);position:absolute;top:18px;right:16px;background:var(--bg);padding:2px 8px;border-radius:10px;}
.card-verb{font-family:'Bangers',cursive;font-size:1.7rem;color:var(--dark);text-align:center;letter-spacing:1px;line-height:1.2;}
.card-tap{font-size:0.68rem;color:var(--muted);position:absolute;bottom:14px;}
.card-meaning{font-size:1.2rem;font-weight:800;color:var(--dark);text-align:center;}
.card-sub{font-size:0.75rem;color:var(--muted);text-align:center;line-height:1.5;margin-top:2px;}
.card-ex{font-size:0.78rem;color:#555;text-align:center;line-height:1.6;margin-top:6px;font-family:'Patrick Hand',cursive;}
.card-ex em{color:var(--red);font-style:normal;font-weight:700;}
.card-ko{font-size:0.7rem;color:var(--muted);text-align:center;font-family:'Nanum Gothic',sans-serif;}

/* NAV */
.nav{display:flex;gap:8px;margin-bottom:10px;}
.nav-btn{flex:1;padding:11px;border-radius:12px;border:1.5px solid var(--border);background:var(--card-bg);font-family:'Nanum Gothic',sans-serif;font-size:0.82rem;font-weight:700;color:var(--text);cursor:pointer;transition:all .15s;}
.nav-btn:hover{background:var(--bg);}
.nav-btn:disabled{opacity:0.35;cursor:default;}
.nav-btn.primary{background:var(--dark);color:var(--yellow);border-color:var(--dark);}
.shuffle-btn{display:block;margin:0 auto;padding:7px 20px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:'Nanum Gothic',sans-serif;font-size:0.75rem;color:var(--muted);cursor:pointer;}
.shuffle-btn:hover{background:var(--card-bg);}

/* QUIZ */
.quiz-q{background:var(--card-bg);border-radius:18px;border:1.5px solid var(--border);padding:22px 20px;margin-bottom:12px;text-align:center;}
.quiz-type{display:inline-block;font-size:0.68rem;font-weight:800;color:var(--red);background:#fff0f1;border:1px solid #ffc0c3;border-radius:20px;padding:3px 10px;margin-bottom:10px;}
.quiz-word{font-family:'Bangers',cursive;font-size:1.5rem;color:var(--dark);letter-spacing:.5px;}
.quiz-word.ko{font-family:'Black Han Sans',sans-serif;font-size:1.25rem;letter-spacing:0;}
.quiz-sub{font-size:0.72rem;color:var(--muted);margin-top:6px;line-height:1.5;}
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opt{padding:13px 10px;border-radius:12px;border:1.5px solid var(--border);background:var(--card-bg);font-family:'Nanum Gothic',sans-serif;font-size:0.82rem;font-weight:700;color:var(--text);cursor:pointer;transition:background .15s,border-color .15s,color .15s;line-height:1.4;text-align:center;-webkit-tap-highlight-color:transparent;}
@media(hover:hover){.opt:hover:not(.disabled){background:var(--bg);}}
.opt:focus{outline:none;}
.opt:focus-visible{outline:none;}
.opt.correct{background:var(--correct-bg);border-color:var(--correct);color:var(--correct);}
.opt.wrong{background:var(--wrong-bg);border-color:var(--wrong);color:var(--wrong);}
.opt.reveal{background:var(--correct-bg);border-color:var(--correct);color:var(--correct);}
.opt.disabled{cursor:default;pointer-events:none;}

/* WRITING */
.writing-section{margin-top:14px;background:#f0fff4;border:1.5px solid var(--green);border-radius:16px;padding:14px 16px;}
.writing-label{font-size:0.68rem;font-weight:800;color:var(--green);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
.writing-item{margin-bottom:14px;}
.writing-item:last-child{margin-bottom:0;}
.wq{font-size:0.85rem;font-weight:700;color:var(--dark);margin-bottom:6px;}
.wq::before{content:"✏️ ";}
.w-input{width:100%;border:1.5px solid var(--green);border-radius:10px;padding:9px 12px;font-family:'Nanum Gothic',sans-serif;font-weight:700;font-size:0.88rem;color:#333;background:white;resize:none;outline:none;min-height:42px;}
.w-input:focus{border-color:#1a9e6b;box-shadow:0 0 0 3px rgba(82,183,136,0.15);}
.w-input:disabled{background:#f5f5f5;color:#aaa;}
.check-btn{margin-top:6px;width:100%;padding:9px;background:var(--green);color:white;border:none;border-radius:10px;font-family:'Nanum Gothic',sans-serif;font-size:0.82rem;font-weight:800;cursor:pointer;}
.check-btn:disabled{background:#aaa;cursor:default;}
.feedback-box{margin-top:8px;background:white;border-radius:10px;border:1.5px solid var(--border);padding:10px 12px;font-size:0.78rem;line-height:1.7;color:#333;}
.feedback-box .correct-ans{color:var(--green);font-weight:700;font-family:'Patrick Hand',cursive;font-size:0.85rem;}
.feedback-box .fb-label{font-size:0.68rem;font-weight:800;color:var(--muted);margin-bottom:4px;}
ins{text-decoration:none;background:#fff0c0;border-radius:3px;padding:0 2px;}
#verb-hint.revealed{background:transparent!important;color:var(--dark)!important;}
del{color:#e63946;background:#fff0f0;border-radius:3px;padding:0 2px;}

/* RESULT */
.result{background:var(--card-bg);border-radius:20px;border:1.5px solid var(--border);padding:28px 20px;text-align:center;}
.result-emoji{font-size:3rem;margin-bottom:12px;}
.result-title{font-family:'Black Han Sans',sans-serif;font-size:1.5rem;color:var(--dark);letter-spacing:0.5px;margin-bottom:6px;}
.result-sub{font-size:0.82rem;color:var(--muted);margin-bottom:20px;}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;}
.stat{background:var(--bg);border-radius:12px;padding:12px 8px;text-align:center;}
.stat-n{font-family:'Bangers',cursive;font-size:1.8rem;line-height:1;}
.stat-l{font-size:0.68rem;color:var(--muted);margin-top:2px;}
.retry-btn{display:inline-block;padding:12px 32px;background:var(--dark);color:var(--yellow);border:none;border-radius:14px;font-family:'Nanum Gothic',sans-serif;font-weight:800;font-size:0.95rem;letter-spacing:0.3px;cursor:pointer;}

/* LIST */
.list-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--card-bg);border-radius:12px;border:1.5px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .15s;}
.list-item:hover{background:var(--bg);}
.li-num{font-family:'Bangers',cursive;font-size:1rem;color:var(--yellow);background:var(--dark);padding:1px 7px;border-radius:10px;min-width:34px;text-align:center;}
.li-verb{font-size:0.85rem;font-weight:800;color:var(--dark);flex:1;}
.li-meaning{font-size:0.75rem;color:var(--muted);}
.li-page{font-size:0.65rem;color:var(--muted);background:var(--bg);padding:2px 7px;border-radius:8px;white-space:nowrap;}

/* QUOTE */
.quote-box{background:#fffbea;border-left:3px solid var(--yellow);border-radius:0 10px 10px 0;padding:8px 12px;margin-top:8px;width:100%;}
.quote-text{font-family:'Patrick Hand',cursive;font-size:0.78rem;color:#555;line-height:1.5;}
.quote-text em{color:var(--red);font-style:italic;font-weight:700;}
</style>
</head>

{"num":8,"verb":"CATCH ~ RED-HANDED","meaning":"현행범으로 잡다 / 딱 걸리다","sub":"나쁜 짓을 하는 순간 바로 들키는 것 — 영화, 드라마에서도 자주 나오는 관용구!","page":"p.34","quote":"\"Mrs. Craig came around the corner and caught us red-handed.\"","quoteKo":"Craig 선생님이 모퉁이를 돌아와서 우리를 현행범으로 잡았어.","ex1_en":"The store caught the shoplifter red-handed.","ex1_ko":"가게에서 도둑을 현행범으로 잡았어.","ex2_en":"Mom caught me red-handed eating the cake.","ex2_ko":"케이크 먹다가 엄마한테 딱 걸렸어.","wq1":"거짓말하다가 딱 걸렸어.","wa1":"I got caught red-handed lying.","wq2":"상사가 걔가 회사 물건 훔치는 걸 현행범으로 잡았어.","wa2":"The boss caught him red-handed stealing from the company."},

{"num":10,"verb":"SNEAK DOWNSTAIRS / UPSTAIRS","meaning":"몰래 아래층/위층으로 가다","sub":"sneak + 방향 — 집 안에서 몰래 움직이는 것","page":"p.36","quote":"\"I snuck downstairs to listen to Rodrick's CD on the stereo.\"","quoteKo":"Rodrick의 CD를 스테레오로 듣기 위해 아래층으로 몰래 내려갔어.","ex1_en":"I snuck downstairs to get a midnight snack.","ex1_ko":"야식 먹으러 몰래 아래층으로 내려갔어.","ex2_en":"The kids snuck upstairs to stay up late.","ex2_ko":"애들이 늦게까지 안 자려고 몰래 위층으로 올라갔어.","wq1":"밤에 몰래 아래층에 내려가서 TV 봤어.","wa1":"I snuck downstairs at night to watch TV.","wq2":"부모님 몰래 위층으로 올라가서 게임 했어.","wa2":"I snuck upstairs to play games without my parents knowing."},
{"num":11,"verb":"CRANK UP","meaning":"볼륨·속도 등을 확 높이다","sub":"turn up보다 더 강하고 갑작스럽게 높이는 느낌","page":"p.36","quote":"\"I cranked up the volume REALLY high.\"","quoteKo":"볼륨을 엄청 크게 올렸어.","ex1_en":"He cranked up the music as soon as his parents left.","ex1_ko":"부모님이 나가자마자 음악 볼륨을 확 높였어.","ex2_en":"Crank up the heat — it's freezing in here!","ex2_ko":"난방 확 높여 — 여기 얼어죽겠어!","wq1":"좋아하는 노래 나오면 항상 볼륨 확 높여.","wa1":"I always crank up the volume when my favorite song comes on.","wq2":"에어컨 좀 세게 틀어줄 수 있어? 너무 더워.","wa2":"Can you crank up the AC? It's so hot."},
{"num":12,"verb":"MARCH ~ UP TO","meaning":"강제로 데려가다 / 끌고 가다","sub":"화가 난 상태에서 누군가를 강제로 어딘가로 데려가는 것","page":"p.37","quote":"\"Dad marched me up to my room and shut the door behind him.\"","quoteKo":"아빠가 나를 방까지 끌고 올라가서 문을 닫았어.","ex1_en":"The teacher marched him up to the principal's office.","ex1_ko":"선생님이 걔를 교장실로 끌고 갔어.","ex2_en":"Mom marched us up to bed at 9 o'clock sharp.","ex2_ko":"엄마가 우리를 정확히 9시에 자러 가라고 끌고 갔어.","wq1":"엄마가 나를 내 방으로 끌고 갔어.","wa1":"My mom marched me up to my room.","wq2":"경비원이 그를 출구로 데리고 갔어.","wa2":"The security guard marched him to the exit."},
{"num":13,"verb":"LET ONE'S GUARD DOWN","meaning":"경계를 풀다 / 방심하다","sub":"조심하던 것을 멈추고 긴장을 푸는 것. 긍정적으로도 부정적으로도 쓰여요","page":"p.38","quote":"\"I kind of let my guard down.\"","quoteKo":"나는 약간 방심했어.","ex1_en":"Never let your guard down in an unfamiliar place.","ex1_ko":"낯선 곳에서는 절대 방심하지 마.","ex2_en":"I finally let my guard down and started to trust him.","ex2_ko":"결국 경계를 풀고 그를 믿기 시작했어.","wq1":"미국 처음 가면 방심하지 마.","wa1":"Don't let your guard down when you first go to the US.","wq2":"친해지면서 경계를 좀 풀게 됐어.","wa2":"As we got closer, I let my guard down a bit."},
{"num":14,"verb":"BE GROUNDED FROM","meaning":"~를 못 하게 금지당하다 (벌로)","sub":"미국 가정에서 아이를 혼낼 때 가장 흔한 표현! 외출 금지 또는 특정 행동 금지","page":"p.38","quote":"\"He told me I was grounded from playing video games for two weeks.\"","quoteKo":"걔가 나한테 2주 동안 비디오 게임 금지라고 했어.","ex1_en":"I'm grounded from using my phone for a week.","ex1_ko":"일주일 동안 폰 사용 금지 당했어.","ex2_en":"She got grounded for coming home late.","ex2_ko":"늦게 들어왔다고 외출 금지 당했어.","wq1":"나 이번 주말에 외출 금지야.","wa1":"I'm grounded this weekend.","wq2":"성적 떨어졌다고 게임 금지 당했어.","wa2":"I got grounded from gaming because my grades dropped."},
{"num":15,"verb":"COOL OFF","meaning":"화가 가라앉다 / 진정하다","sub":"열이 오른 감정이나 온도가 내려가는 것 — 'Let him cool off' 패턴도 자주 써요!","page":"p.38","quote":"\"when he gets mad, he cools off real quick, and then it's over.\"","quoteKo":"아빠는 화가 나도 금방 진정하고 끝나.","ex1_en":"Give him some time to cool off before you talk to him.","ex1_ko":"말 걸기 전에 걔 좀 진정할 시간을 줘.","ex2_en":"Let the soup cool off before you eat it.","ex2_ko":"먹기 전에 수프 좀 식혀.","wq1":"화났을 때 바로 말하지 말고 진정하고 나서 해.","wa1":"Don't talk when you're angry — cool off first.","wq2":"싸우고 나서 진정하는 데 시간이 좀 걸렸어.","wa2":"It took a while to cool off after the argument."},
{"num":16,"verb":"GET OFF EASY","meaning":"가볍게 넘어가다 / 벌을 적게 받다","sub":"예상보다 가벼운 처벌이나 결과를 받는 것 — get off lightly라고도 해요","page":"p.40","quote":"\"you do all these nice things to try to get off easier.\"","quoteKo":"더 가볍게 넘어가려고 온갖 좋은 행동을 하는 거야.","ex1_en":"He got off easy with just a warning.","ex1_ko":"경고만으로 가볍게 넘어갔어.","ex2_en":"You're lucky you got off so easy.","ex2_ko":"이렇게 가볍게 넘어간 게 다행인 줄 알아.","wq1":"이번엔 가볍게 넘어갔지만 다음엔 안 그럴 거야.","wa1":"You got off easy this time, but it won't happen again.","wq2":"벌금만 내고 가볍게 넘어갔어.","wa2":"I got off easy with just a fine."},
{"num":17,"verb":"LAY IT ON","meaning":"벌·비판 등을 들이붓다 / 갑자기 터뜨리다","sub":"잊을 만할 때 갑자기 혼내거나 감정을 쏟아내는 것","page":"p.40","quote":"\"right when YOU forget you're in trouble, that's when she lays it on you.\"","quoteKo":"네가 잊었을 바로 그때 엄마가 한꺼번에 쏟아내.","ex1_en":"She waited until I relaxed, then laid it on me.","ex1_ko":"내가 긴장을 풀 때까지 기다렸다가 한방에 터뜨렸어.","ex2_en":"Don't lay it on him all at once — take it easy.","ex2_ko":"한꺼번에 다 들이붓지 마 — 천천히 해.","wq1":"잊을 만하면 엄마가 갑자기 또 혼내.","wa1":"Just when I forget, my mom lays it on me again.","wq2":"걔가 느닷없이 나한테 모든 걸 쏟아냈어.","wa2":"He suddenly laid it all on me out of nowhere."},
{"num":18,"verb":"GET WORKED UP","meaning":"흥분하다 / 화내다 / 난리 치다","sub":"별것도 아닌 일에 감정적으로 흥분하거나 화를 내는 것 — 'Don't get worked up' 패턴 자주 써요!","page":"p.41","quote":"\"it honestly wasn't anything to get worked up over.\"","quoteKo":"솔직히 별로 흥분할 일도 아니었어.","ex1_en":"Don't get worked up about it — it's not a big deal.","ex1_ko":"그것 때문에 흥분하지 마 — 별거 아니야.","ex2_en":"She gets worked up over the smallest things.","ex2_ko":"그녀는 사소한 것에도 엄청 예민하게 반응해.","wq1":"그것 때문에 그렇게 흥분할 필요 없어.","wa1":"There's no need to get worked up about that.","wq2":"시험 때마다 너무 긴장해서 난리야.","wa2":"I always get worked up before every exam."},
{"num":19,"verb":"GET AHOLD OF","meaning":"~를 손에 넣다 / ~와 연락이 닿다","sub":"물건을 손에 넣거나, 사람에게 연락이 닿는 두 가지 뜻!","page":"p.41","quote":"\"Manny got ahold of one of Rodrick's heavy metal magazines.\"","quoteKo":"Manny가 Rodrick의 헤비메탈 잡지 하나를 손에 넣었어.","ex1_en":"I finally got ahold of the tickets.","ex1_ko":"드디어 티켓을 손에 넣었어.","ex2_en":"I've been trying to get ahold of you all day!","ex2_ko":"하루 종일 연락하려고 했는데!","wq1":"그 책 어디서 구할 수 있어?","wa1":"Where can I get ahold of that book?","wq2":"미국 가서 연락 안 되면 이메일로 연락해.","wa2":"If you can't get ahold of me in the US, try email."},
{"num":20,"verb":"RUN FOR","meaning":"~에 출마하다 / ~직에 지원하다","sub":"선거나 직책에 후보로 나서는 것 — 미국 뉴스, 정치 관련 대화에서 자주 나와요!","page":"p.44","quote":"\"I realized getting elected Treasurer could TOTALLY change my situation... I ran for student government.\"","quoteKo":"총무로 뽑히면 상황이 완전히 바뀔 수 있다는 걸 깨닫고 출마했어.","ex1_en":"She decided to run for class president.","ex1_ko":"그녀가 학급 회장 선거에 출마하기로 했어.","ex2_en":"He's running for mayor next year.","ex2_ko":"걔 내년에 시장 선거에 출마해.","wq1":"미국에서 누가 대통령 선거에 출마할지 알아?","wa1":"Do you know who's running for president in the US?","wq2":"걔가 회장 선거에 나가서 이겼어.","wa2":"He ran for president and won."},
{"num":21,"verb":"SIGN UP","meaning":"신청하다 / 등록하다 / 가입하다","sub":"수업, 서비스, 대회 등에 신청하거나 등록하는 것 — 미국에서 매일 쓰는 표현!","page":"p.45","quote":"\"I figure if I sign up tomorrow, the Treasurer job is pretty much mine for the taking.\"","quoteKo":"내일 신청하면 총무 자리는 거의 내 것이나 다름없어.","ex1_en":"I signed up for an English class online.","ex1_ko":"온라인 영어 수업 신청했어.","ex2_en":"Have you signed up for the gym yet?","ex2_ko":"헬스장 등록했어?","wq1":"미국 가면 어떤 수업 신청할 거야?","wa1":"What classes are you going to sign up for in the US?","wq2":"뉴스레터 구독 신청했어.","wa2":"I signed up for the newsletter."},
{"num":22,"verb":"DIG THROUGH","meaning":"뒤지다 / 헤집어 찾다","sub":"상자, 서랍, 짐 등을 뒤져서 무언가를 찾는 것","page":"p.46","quote":"\"Dad dug through some old boxes in the basement and found one of his campaign posters.\"","quoteKo":"아빠가 지하실 낡은 상자들을 뒤지다가 옛날 선거 포스터를 찾아냈어.","ex1_en":"I dug through my bag but couldn't find my keys.","ex1_ko":"가방을 다 뒤졌는데 열쇠를 못 찾겠어.","ex2_en":"She dug through old photos to find one of her grandma.","ex2_ko":"할머니 사진을 찾으려고 옛날 사진을 다 뒤졌어.","wq1":"박스를 다 뒤졌는데 없어.","wa1":"I dug through all the boxes but couldn't find it.","wq2":"서랍 뒤져봐 — 거기 있을 거야.","wa2":"Dig through the drawer — it should be in there."},
{"num":23,"verb":"LOAD UP ON","meaning":"잔뜩 사다 / 잔뜩 챙기다","sub":"필요한 것을 넉넉하게 많이 사거나 챙겨두는 것","page":"p.46","quote":"\"I loaded up on poster board and markers.\"","quoteKo":"나는 포스터 보드와 마커를 잔뜩 챙겼어.","ex1_en":"I loaded up on snacks before the road trip.","ex1_ko":"로드트립 전에 간식을 잔뜩 샀어.","ex2_en":"She loaded up on vitamins before flu season.","ex2_ko":"독감 시즌 전에 비타민을 잔뜩 챙겼어.","wq1":"미국 가기 전에 한국 라면 잔뜩 샀어.","wa1":"I loaded up on Korean ramen before going to the US.","wq2":"세일할 때 생필품 잔뜩 사뒀어.","wa2":"I loaded up on essentials during the sale."},
{"num":24,"verb":"HANG UP","meaning":"걸다 / (전화를) 끊다","sub":"포스터·그림 등을 벽에 걸거나, 전화를 끊을 때도 써요","page":"p.48","quote":"\"I started hanging my posters up as soon as I got in.\"","quoteKo":"학교에 들어서자마자 포스터를 붙이기 시작했어.","ex1_en":"Can you help me hang up these pictures?","ex1_ko":"이 사진들 거는 것 좀 도와줄 수 있어?","ex2_en":"Don't hang up! I need to tell you something.","ex2_ko":"전화 끊지 마! 할 말이 있어.","wq1":"새 달력 벽에 걸었어.","wa1":"I hung up a new calendar on the wall.","wq2":"그 사람이 갑자기 전화 끊었어.","wa2":"He suddenly hung up on me."},
{"num":25,"verb":"TAKE DOWN","meaning":"떼어내다 / 내리다","sub":"벽에 붙은 것을 떼거나 내려놓는 것","page":"p.48","quote":"\"he took down all my posters anyway.\"","quoteKo":"어쨌든 걔가 내 포스터를 다 떼어냈어.","ex1_en":"They took down all the decorations after the party.","ex1_ko":"파티 끝나고 장식을 다 떼어냈어.","ex2_en":"The post was taken down by the admin.","ex2_ko":"그 게시글은 관리자에 의해 내려졌어.","wq1":"크리스마스 장식 언제 떼어낼 거야?","wa1":"When are you going to take down the Christmas decorations?","wq2":"그 포스터 내려줄 수 있어? 너무 산만해.","wa2":"Can you take down that poster? It's too distracting."},
{"num":26,"verb":"GO AROUND (~ING)","meaning":"돌아다니며 ~하다","sub":"여러 곳을 돌아다니면서 어떤 행동을 하는 것","page":"p.48","quote":"\"Marty Porter was going around handing out lollipops to buy himself votes.\"","quoteKo":"Marty Porter가 표를 사려고 막대사탕을 나눠주며 돌아다녔어.","ex1_en":"He's been going around telling everyone about it.","ex1_ko":"걔가 돌아다니면서 모두한테 그 얘기를 하고 있어.","ex2_en":"There's a cold going around — be careful.","ex2_ko":"감기가 돌고 있어 — 조심해.","wq1":"걔가 돌아다니면서 명함 나눠주고 있어.","wa1":"He's going around handing out his business cards.","wq2":"독감이 퍼지고 있으니까 조심해.","wa2":"There's a flu going around so be careful."},
{"num":27,"verb":"GET TOO OLD TO","meaning":"~하기엔 너무 나이가 들다","sub":"'You're too old to ~' 패턴 — 나이 때문에 뭔가를 그만해야 할 때","page":"p.49","quote":"\"Mom says I'm getting too old to go trick-or-treating anymore.\"","quoteKo":"엄마는 내가 이제 너무 커서 핼러윈 사탕 받으러 다닐 수 없다고 해.","ex1_en":"You're never too old to learn something new.","ex1_ko":"새로운 것을 배우기에 너무 늦은 나이는 없어.","ex2_en":"Am I getting too old to wear this?","ex2_ko":"내가 이거 입기엔 너무 나이 든 건가?","wq1":"새로운 것 배우기에 너무 늦은 나이는 없어.","wa1":"You're never too old to learn something new.","wq2":"그걸 하기엔 너무 나이 든 것 같아서 그만뒀어.","wa2":"I felt I was getting too old to do that, so I stopped."},

];

let mode='flash', idx=0, order=[...Array(40).keys()], flipped=false;
let qOrder=[], qIdx=0, score={c:0,w:0};
let wOrder=[...Array(40).keys()], wIdx=0, wFeedback={};

// 오답노트 상태: 카드 num(1~40) 기준으로 저장
let quizWrong = new Set();   // 퀴즈에서 틀린 적 있는 카드 num
let writeWrong = new Set();  // 작문에서 틀린 적 있는 카드 num (각 카드 1·2번 문항 중 하나라도 오답이면 포함)
let reviewQOrder=[], reviewQIdx=0, reviewScore={c:0,w:0};
let reviewWOrder=[], reviewWIdx=0;

function sh(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ── localStorage 진도 저장/불러오기 ── */
const SAVE_KEY = 'wimpykid_progress_v1::p32-59';

function saveProgress(){
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      flashIdx: idx,
      flashOrder: order,
      wIdx: wIdx,
      wOrder: wOrder,
      wFeedback: wFeedback,
      quizWrong: [...quizWrong],
      writeWrong: [...writeWrong],
    }));
  } catch(e){ /* 저장 실패 시 무시 */ }
}

function loadProgress(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const p = JSON.parse(raw);
    idx       = p.flashIdx  ?? 0;
    order     = p.flashOrder ?? [...Array(40).keys()];
    wIdx      = p.wIdx      ?? 0;
    wOrder    = p.wOrder    ?? [...Array(40).keys()];
    wFeedback = p.wFeedback ?? {};
    quizWrong = new Set(p.quizWrong ?? []);
    writeWrong= new Set(p.writeWrong ?? []);
    return true;
  } catch(e){ return false; }
}

function resetProgress(){
  if(!confirm('진도를 초기화할까요?\n플래시카드 위치, 작문 첨삭, 오답노트가 모두 삭제됩니다.')) return;
  localStorage.removeItem(SAVE_KEY);
  idx=0; order=[...Array(40).keys()]; flipped=false;
  wIdx=0; wOrder=[...Array(40).keys()]; wFeedback={};
  quizWrong=new Set(); writeWrong=new Set();
  mode='flash';
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.textContent.includes('플래시')));
  showToast('✅ 진도가 초기화됐어요!');
  render();
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--dark);color:var(--yellow);font-family:\'Nanum Gothic\',sans-serif;font-size:0.82rem;font-weight:700;padding:10px 22px;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:9999;opacity:0;transition:opacity .3s;';
    document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.opacity='0';},2000);
}

function updateBadges(){
  const bq=document.getElementById('badge-quiz'), bw=document.getElementById('badge-write');
  if(bq){bq.textContent=quizWrong.size;bq.style.display=quizWrong.size?'flex':'none';}
  if(bw){bw.textContent=writeWrong.size;bw.style.display=writeWrong.size?'flex':'none';}
}
/* ─────────────────────────────────── */

function setMode(m){
  mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const labels={flash:'플래시',quiz:'퀴즈',write:'작문',list:'목록',quizReview:'퀴즈 오답',writeReview:'작문 오답'};
  document.querySelectorAll('.tab').forEach(t=>{if(t.textContent.includes(labels[m]))t.classList.add('active');});
  if(m==='quiz'){qOrder=sh([...Array(40).keys()]);qIdx=0;score={c:0,w:0};}
  if(m==='write'&&wOrder.length===0){wOrder=[...Array(40).keys()];}
  if(m==='flash'){flipped=false;}
  if(m==='quizReview'){reviewQOrder=sh([...quizWrong]);reviewQIdx=0;reviewScore={c:0,w:0};}
  if(m==='writeReview'){reviewWOrder=[...writeWrong];reviewWIdx=0;}
  render();
}

function updProg(){
  let cur, total, rightLabel='';
  if(mode==='list'){cur=40;total=40;}
  else if(mode==='flash'){cur=idx+1;total=40;}
  else if(mode==='quiz'){cur=Math.min(qIdx+1,40);total=40;rightLabel=`✅ ${score.c}  ❌ ${score.w}`;}
  else if(mode==='write'){cur=wIdx+1;total=40;}
  else if(mode==='quizReview'){total=Math.max(reviewQOrder.length,1);cur=Math.min(reviewQIdx+1,total);rightLabel=`✅ ${reviewScore.c}  ❌ ${reviewScore.w}`;}
  else if(mode==='writeReview'){total=Math.max(reviewWOrder.length,1);cur=Math.min(reviewWIdx+1,total);}
  const pct=Math.round(cur/total*100);
  document.getElementById('prog-label').textContent=mode==='list'?`전체 40개`:`${cur} / ${total}`;
  document.getElementById('prog-right').textContent=rightLabel;
  document.getElementById('prog-fill').style.width=pct+'%';
  updateBadges();
}

function render(){
  updProg();
  const el=document.getElementById('main');
  if(mode==='flash')renderFlash(el);
  else if(mode==='quiz')renderQuiz(el);
  else if(mode==='write')renderWrite(el);
  else if(mode==='quizReview')renderQuizReview(el);
  else if(mode==='writeReview')renderWriteReview(el);
  else renderList(el);
}

function renderFlash(el){
  const c=CARDS[order[idx]];
  el.innerHTML=`
  <div class="card-scene" onclick="doFlip()">
    <div class="card-inner${flipped?' flipped':''}" id="ci">
      <div class="card-face">
        <span class="card-num">${String(c.num).padStart(2,'0')}</span>
        <span class="card-page">${c.page}</span>
        <div class="card-verb">${c.verb}</div>
        <div class="card-tap">탭해서 뜻 확인 👆</div>
      </div>
      <div class="card-face card-back">
        <span class="card-num">${String(c.num).padStart(2,'0')}</span>
        <span class="card-page">${c.page}</span>
        <div class="card-meaning">${c.meaning}</div>
        <div class="card-sub">${c.sub}</div>
        ${c.ex1_en?`<div class="card-ex">${c.ex1_en}</div><div class="card-ko">${c.ex1_ko}</div>`:''}
        ${c.quote?`<div class="quote-box"><div class="quote-text">"${c.quote}"</div>${c.quoteKo?`<div style="font-size:0.72rem;color:#999;margin-top:5px;font-family:'Nanum Gothic',sans-serif;line-height:1.5;">"${c.quoteKo}"</div>`:''}</div>`:''}
      </div>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn" onclick="prev()" ${idx===0?'disabled':''}>◀ 이전</button>
    <button class="nav-btn" onclick="doFlip()">뒤집기</button>
    <button class="nav-btn primary" onclick="next()" ${idx===39?'disabled':''}>다음 ▶</button>
  </div>
  <div style="text-align:center;margin-top:6px">
    <button class="shuffle-btn" onclick="doShuffle()">🔀 순서 섞기</button>
  </div>`;
}
function doFlip(){flipped=!flipped;const ci=document.getElementById('ci');if(ci)ci.classList.toggle('flipped',flipped);}
function prev(){if(idx>0){idx--;flipped=false;saveProgress();render();}}
function next(){if(idx<39){idx++;flipped=false;saveProgress();render();}}
function doShuffle(){sh(order);idx=0;flipped=false;saveProgress();render();}

function renderQuiz(el){
  if(qIdx>=40){
    const pct=Math.round(score.c/40*100);
    const msg=pct>=90?'🏆 완벽해요!':pct>=70?'👏 잘 했어요!':pct>=50?'💪 한번 더!':'📖 다시 공부해봐요!';
    el.innerHTML=`<div class="result">
      <div class="result-emoji">${pct>=90?'🎉':pct>=70?'😊':pct>=50?'🤔':'😅'}</div>
      <div class="result-title">${msg}</div>
      <div class="result-sub">40문제 완료</div>
      <div class="stats">
        <div class="stat"><div class="stat-n" style="color:var(--correct)">${score.c}</div><div class="stat-l">정답</div></div>
        <div class="stat"><div class="stat-n" style="color:var(--wrong)">${score.w}</div><div class="stat-l">오답</div></div>
        <div class="stat"><div class="stat-n">${pct}%</div><div class="stat-l">정답률</div></div>
      </div>
      <button class="retry-btn" onclick="setMode('quiz')">다시 풀기</button>
      ${quizWrong.size?`<button class="retry-btn" style="margin-top:8px;background:var(--red);" onclick="setMode('quizReview')">📌 오답 ${quizWrong.size}개 다시 풀기</button>`:''}
    </div>`;return;
  }
  const c=CARDS[qOrder[qIdx]];
  const type=qIdx%2; // 0=EN→KO, 1=KO→EN
  const q=type===0?c.verb:c.meaning;
  const ans=type===0?c.meaning:c.verb;
  const pool=CARDS.filter(x=>x.num!==c.num);sh(pool);
  const wrongs=pool.slice(0,3).map(x=>type===0?x.meaning:x.verb);
  const opts=sh([ans,...wrongs]);
  el.innerHTML=`<div class="quiz-wrap">
    <div class="quiz-q">
      <div class="quiz-type">${type===0?'구동사 → 뜻':'뜻 → 구동사'}</div>
      <div class="quiz-word${type===1?' ko':''}">${q}</div>
    </div>

function checkWrite(cardIdx, qNum){
  const c = CARDS[wOrder[cardIdx]];
  const inputEl = document.getElementById('wi'+qNum);
  const userText = inputEl ? inputEl.value.trim() : '';
  if(!userText){alert('먼저 영어 문장을 써주세요!');return;}

  const modelAns = qNum===1 ? c.wa1 : c.wa2;

  if(!wFeedback[cardIdx]) wFeedback[cardIdx]={};
  if(qNum===1){wFeedback[cardIdx].input1=userText;} else {wFeedback[cardIdx].input2=userText;}

  const result = buildFeedback(userText, modelAns);
  if(qNum===1){wFeedback[cardIdx].fb1=result.html;wFeedback[cardIdx].err1=result.hasError;}
  else {wFeedback[cardIdx].fb2=result.html;wFeedback[cardIdx].err2=result.hasError;}

  // 오답노트 갱신: 1번 또는 2번 중 하나라도 틀리면 포함, 둘 다 맞으면 졸업
  const fb=wFeedback[cardIdx];
  const stillWrong = fb.err1 || fb.err2;
  if(stillWrong) writeWrong.add(c.num);
  else if(fb.fb1!==undefined && fb.fb2!==undefined) writeWrong.delete(c.num);

  saveProgress();
  render();
}

function normalize(str){
  return str.toLowerCase().replace(/[^a-z0-9'\s]/g,'').trim();
}

function buildFeedback(userRaw, modelRaw){
  const user = normalize(userRaw);
  const model = normalize(modelRaw);

  // Perfect match
  if(user === model){
    return {hasError:false, html:`<span style="color:#27500a;font-weight:800;">✅ 완벽해요!</span>
    <div class="fb-label" style="margin-top:8px">모범 답안</div>
    <div class="correct-ans">${modelRaw}</div>`};
  }

  // Word-level diff
  const uWords = user.split(/\s+/);
  const mWords = model.split(/\s+/);
  const mRawWords = modelRaw.split(/\s+/);

  // LCS-based diff
  const m = uWords.length, n = mWords.length;
  const dp = Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j] = uWords[i-1]===mWords[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j],dp[i][j-1]);

  // Traceback
  let i=m, j=n, diff=[];
  while(i>0||j>0){
    if(i>0&&j>0&&uWords[i-1]===mWords[j-1]){
      diff.unshift({type:'ok', word:mRawWords[j-1]});i--;j--;
    } else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){
      diff.unshift({type:'add', word:mRawWords[j-1]});j--;
    } else {
      diff.unshift({type:'del', word:uWords[i-1]});i--;
    }
  }

  const hasError = diff.some(d=>d.type!=='ok');
  let diffHtml = diff.map(d=>{
    if(d.type==='ok') return `<span style="color:#27500a">${d.word}</span>`;
    if(d.type==='del') return `<del>${d.word}</del>`;
    if(d.type==='add') return `<ins>${d.word}</ins>`;
  }).join(' ');

  return {hasError, html:`<span style="color:#e63946;font-weight:800;">❌ 수정이 필요해요</span>
  <div class="fb-label" style="margin-top:8px">내가 쓴 문장 vs 모범 답안</div>
  <div style="line-height:2;font-size:0.82rem">${diffHtml}</div>
  <div class="fb-label" style="margin-top:8px">모범 답안</div>
  <div class="correct-ans">${modelRaw}</div>
  <div style="font-size:0.7rem;color:var(--muted);margin-top:4px"><del>빨간색</del> = 내가 쓴 것 &nbsp; <ins>노란색</ins> = 빠진 것 &nbsp; <span style="color:#27500a">초록색</span> = 맞은 것</div>`};
}

function checkReviewWrite(cardNum, qNum){
  const c = CARDS[cardNum-1];
  const inputEl = document.getElementById('rwi'+qNum);
  const userText = inputEl ? inputEl.value.trim() : '';
  if(!userText){alert('먼저 영어 문장을 써주세요!');return;}
  const modelAns = qNum===1 ? c.wa1 : c.wa2;
  const result = buildFeedback(userText, modelAns);

  // 원래 wFeedback에 재시도 결과를 별도 필드(reFb/reInput)로 저장 → 해당 문항 칸 안에 바로 표시
  const origIdx = wOrder.indexOf(cardNum-1);
  if(origIdx>=0){
    if(!wFeedback[origIdx]) wFeedback[origIdx]={};
    const fb = wFeedback[origIdx];
    if(qNum===1){fb.reInput1=userText;fb.reFb1=result.html;fb.err1=result.hasError;}
    else {fb.reInput2=userText;fb.reFb2=result.html;fb.err2=result.hasError;}
    if(!fb.err1 && !fb.err2) writeWrong.delete(cardNum);
  }
  saveProgress();
  updateBadges();
  render();
}
