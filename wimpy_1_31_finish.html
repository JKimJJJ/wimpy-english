<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wimpy Kid 구동사 암기 — p.1-31</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5c842">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Black+Han+Sans&family=Nanum+Gothic:wght@400;700;800&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;
  --card-bg:#ffffff;
  --dark:#1a1d2e;
  --yellow:#f5c842;
  --red:#e63946;
  --green:#52b788;
  --blue:#4361ee;
  --text:#1a1d2e;
  --muted:#888;
  --border:#e0dbd0;
  --correct-bg:#eaf3de;--correct:#27500a;
  --wrong-bg:#fcebeb;--wrong:#501313;
}
body{background:var(--bg);font-family:'Nanum Gothic',sans-serif;min-height:100vh;padding:40px 16px 60px;}

/* 좌상단 출처 / 우상단 배포 안내 — 스크롤해도 항상 고정, 휴대폰 상태바와 안 겹치게 여유 확보 */
.corner-tag{
  position:fixed;
  top:calc(env(safe-area-inset-top, 0px) + 38px);
  font-size:0.62rem;
  color:#aaa;
  font-family:'Nanum Gothic',sans-serif;
  z-index:1000;
  pointer-events:none;
  letter-spacing:0.1px;
  white-space:nowrap;
}
.corner-tag.left{left:14px;}
.corner-tag.right{right:14px;text-align:right;}
@media (max-width:360px){
  .corner-tag{font-size:0.56rem;}
}
#app{max-width:480px;margin:0 auto;}

/* HEADER */
.header{text-align:center;margin-bottom:24px;padding:20px 16px;background:var(--dark);border-radius:20px;}
.header h1{font-family:'Bangers',cursive;font-size:1.7rem;color:var(--yellow);letter-spacing:2px;}
.header p{font-size:0.72rem;color:rgba(255,255,255,0.35);margin-top:4px;}

/* MODE TABS */
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.tab{flex:1;min-width:0;padding:10px 4px;border-radius:12px;border:1.5px solid var(--border);background:var(--card-bg);color:var(--muted);font-family:'Nanum Gothic',sans-serif;font-size:0.72rem;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;position:relative;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tab.active{background:var(--dark);color:var(--yellow);border-color:var(--dark);}
.tab-badge{position:absolute;top:2px;right:2px;background:var(--wrong);color:#fff;font-size:0.58rem;font-weight:800;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;line-height:1;}

/* PROGRESS */
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.prog-label{font-size:0.72rem;font-weight:700;color:var(--muted);}
.prog-bar{height:5px;background:var(--border);border-radius:3px;margin-bottom:18px;overflow:hidden;}
.prog-fill{height:100%;background:var(--red);border-radius:3px;transition:width .35s;}

/* FLASHCARD */
.card-scene{perspective:1000px;height:310px;cursor:pointer;margin-bottom:14px;user-select:none;position:relative;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1);}
.card-inner.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;backface-visibility:hidden;background:var(--card-bg);border-radius:20px;border:1.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:38px 20px 14px;gap:4px;overflow:hidden;}
.card-back{transform:rotateY(180deg);}
.card-num-row{position:absolute;top:12px;left:14px;display:flex;align-items:center;gap:4px;z-index:2;}
.card-num{font-family:'Bangers',cursive;font-size:1.1rem;color:var(--yellow);background:var(--dark);padding:2px 10px;border-radius:20px;}
.bm-star{width:30px;height:30px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.speak-btn{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border:none;background:transparent;cursor:pointer;flex-shrink:0;padding:0;-webkit-tap-highlight-color:transparent;color:#9a8f6a;transition:transform .12s, color .12s;vertical-align:middle;}
.speak-btn svg{width:16px;height:16px;}
.speak-btn:active{transform:scale(0.85);}
.speak-btn.speaking{color:var(--red);animation:speakPulse .6s ease-in-out infinite;}
@keyframes speakPulse{0%,100%{opacity:1;}50%{opacity:0.45;}}
.speak-btn.verb-speak{width:28px;height:28px;}
.speak-btn.verb-speak svg{width:18px;height:18px;}
.bm-star svg{width:22px;height:22px;transition:transform .15s;}
.bm-star svg path{fill:#d8d3c5;stroke:#d8d3c5;stroke-width:1.5;transition:fill .15s,stroke .15s;}
.bm-star.on svg path{fill:var(--yellow);stroke:#c79a1e;}
.bm-star:active svg{transform:scale(0.85);}
.card-page{font-size:0.68rem;color:var(--muted);position:absolute;top:18px;right:16px;background:var(--bg);padding:2px 8px;border-radius:10px;z-index:2;}
.card-verb{font-family:'Bangers',cursive;font-size:1.7rem;color:var(--dark);text-align:center;letter-spacing:1px;line-height:1.2;}
.card-tap{font-size:0.68rem;color:var(--muted);position:absolute;bottom:14px;}
.card-meaning{font-size:1.2rem;font-weight:800;color:var(--dark);text-align:center;}
.card-sub{font-size:0.75rem;color:var(--muted);text-align:center;line-height:1.5;margin-top:2px;}
.card-ex{font-size:0.78rem;color:#555;text-align:center;line-height:1.6;margin-top:6px;font-family:'Patrick Hand',cursive;}
.card-ex em{color:var(--red);font-style:normal;font-weight:700;}
.card-ko{font-size:0.7rem;color:var(--muted);text-align:center;font-family:'Nanum Gothic',sans-serif;}

/* NAV */
.nav{display:flex;gap:8px;margin-bottom:10px;}
.nav-btn{flex:1;padding:11px;border-radius:12px;border:1.5px solid var(--border);background:var(--card-bg);font-family:'Nanum Gothic',sans-serif;font-size:0.82rem;font-weight:700;color:var(--text);cursor:pointer;transition:all .15s;}
.nav-btn:hover{background:var(--bg);}
.nav-btn:disabled{opacity:0.35;cursor:default;}
.nav-btn.primary{background:var(--dark);color:var(--yellow);border-color:var(--dark);}
.shuffle-btn{display:block;margin:0 auto;padding:7px 20px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:'Nanum Gothic',sans-serif;font-size:0.75rem;color:var(--muted);cursor:pointer;}
.shuffle-btn:hover{background:var(--card-bg);}

/* QUIZ */
.quiz-q{background:var(--card-bg);border-radius:18px;border:1.5px solid var(--border);padding:22px 20px;margin-bottom:12px;text-align:center;}
.quiz-type{display:inline-block;font-size:0.68rem;font-weight:800;color:var(--red);background:#fff0f1;border:1px solid #ffc0c3;border-radius:20px;padding:3px 10px;margin-bottom:10px;}
.quiz-word{font-family:'Bangers',cursive;font-size:1.5rem;color:var(--dark);letter-spacing:.5px;}
.quiz-word.ko{font-family:'Black Han Sans',sans-serif;font-size:1.25rem;letter-spacing:0;}
.quiz-sub{font-size:0.72rem;color:var(--muted);margin-top:6px;line-height:1.5;}
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opt{padding:13px 10px;border-radius:12px;border:1.5px solid var(--border);background:var(--card-bg);font-family:'Nanum Gothic',sans-serif;font-size:0.82rem;font-weight:700;color:var(--text);cursor:pointer;transition:background .15s,border-color .15s,color .15s;line-height:1.4;text-align:center;-webkit-tap-highlight-color:transparent;}
@media(hover:hover){.opt:hover:not(.disabled){background:var(--bg);}}
.opt:focus{outline:none;}
.opt:focus-visible{outline:none;}
.opt.correct{background:var(--correct-bg);border-color:var(--correct);color:var(--correct);}
.opt.wrong{background:var(--wrong-bg);border-color:var(--wrong);color:var(--wrong);}
.opt.reveal{background:var(--correct-bg);border-color:var(--correct);color:var(--correct);}
.opt.disabled{cursor:default;pointer-events:none;}

/* WRITING */
.writing-section{margin-top:14px;background:#f0fff4;border:1.5px solid var(--green);border-radius:16px;padding:14px 16px;}
.writing-label{font-size:0.68rem;font-weight:800;color:var(--green);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
.writing-item{margin-bottom:14px;}
.writing-item:last-child{margin-bottom:0;}
.wq{font-size:0.85rem;font-weight:700;color:var(--dark);margin-bottom:6px;}
.wq::before{content:"✏️ ";}
.w-input{width:100%;border:1.5px solid var(--green);border-radius:10px;padding:9px 12px;font-family:'Nanum Gothic',sans-serif;font-weight:700;font-size:16px;color:#333;background:white;resize:none;outline:none;min-height:42px;}
.w-input:focus{border-color:#1a9e6b;box-shadow:0 0 0 3px rgba(82,183,136,0.15);}
.w-input:disabled{background:#f5f5f5;color:#aaa;}
.check-btn{margin-top:6px;width:100%;padding:9px;background:var(--green);color:white;border:none;border-radius:10px;font-family:'Nanum Gothic',sans-serif;font-size:0.82rem;font-weight:800;cursor:pointer;}
.check-btn:disabled{background:#aaa;cursor:default;}
.feedback-box{margin-top:8px;background:white;border-radius:10px;border:1.5px solid var(--border);padding:10px 12px;font-size:0.78rem;line-height:1.7;color:#333;}
.feedback-box .correct-ans{color:var(--green);font-weight:700;font-family:'Patrick Hand',cursive;font-size:0.85rem;}
.feedback-box .fb-label{font-size:0.68rem;font-weight:800;color:var(--muted);margin-bottom:4px;}
ins{text-decoration:none;background:#fff0c0;border-radius:3px;padding:0 2px;}
#verb-hint.revealed{background:transparent!important;color:var(--dark)!important;}
del{color:#e63946;background:#fff0f0;border-radius:3px;padding:0 2px;}

/* RESULT */
.result{background:var(--card-bg);border-radius:20px;border:1.5px solid var(--border);padding:28px 20px;text-align:center;}
.result-emoji{font-size:3rem;margin-bottom:12px;}
.result-title{font-family:'Black Han Sans',sans-serif;font-size:1.5rem;color:var(--dark);letter-spacing:0.5px;margin-bottom:6px;}
.result-sub{font-size:0.82rem;color:var(--muted);margin-bottom:20px;}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;}
.stat{background:var(--bg);border-radius:12px;padding:12px 8px;text-align:center;}
.stat-n{font-family:'Bangers',cursive;font-size:1.8rem;line-height:1;}
.stat-l{font-size:0.68rem;color:var(--muted);margin-top:2px;}
.retry-btn{display:inline-block;padding:12px 32px;background:var(--dark);color:var(--yellow);border:none;border-radius:14px;font-family:'Nanum Gothic',sans-serif;font-weight:800;font-size:0.95rem;letter-spacing:0.3px;cursor:pointer;}

/* LIST */
.list-search{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid var(--border);font-family:'Nanum Gothic',sans-serif;font-size:16px;margin-bottom:12px;outline:none;background:var(--card-bg);color:var(--text);}
.list-search:focus{border-color:var(--dark);}
.list-empty{text-align:center;padding:30px 10px;color:var(--muted);font-size:0.85rem;}
.list-item{display:flex;align-items:center;gap:8px;padding:11px 14px;background:var(--card-bg);border-radius:12px;border:1.5px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .15s;}
.list-item:hover{background:var(--bg);}
.li-num{font-family:'Bangers',cursive;font-size:1rem;color:var(--yellow);background:var(--dark);padding:1px 7px;border-radius:10px;min-width:34px;text-align:center;flex-shrink:0;}
.li-star{font-size:0.85rem;flex-shrink:0;width:16px;text-align:center;}
.li-verb{font-size:0.85rem;font-weight:800;color:var(--dark);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.li-meaning{font-size:0.75rem;color:var(--muted);max-width:35%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.li-page{font-size:0.65rem;color:var(--muted);background:var(--bg);padding:2px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0;}

/* QUOTE */
.quote-box{background:#fffbea;border-left:3px solid var(--yellow);border-radius:0 10px 10px 0;padding:8px 12px;margin-top:8px;width:100%;}
.quote-text{font-family:'Patrick Hand',cursive;font-size:0.78rem;color:#555;line-height:1.5;}
.quote-text em{color:var(--red);font-style:italic;font-weight:700;}
</style>
</head>

/* ── 음성 읽기 (Web Speech API) ── */
let _ttsVoice = null;
function _pickVoice(){
  if(!('speechSynthesis' in window)) return null;
  const voices = speechSynthesis.getVoices();
  if(!voices.length) return null;
  // 1순위: 표지(cover.html)의 음성 설정에서 사용자가 직접 고른 음성이 있으면 그것을 사용
  try{
    const savedName = localStorage.getItem('wimpykid_voice_pref_v1');
    if(savedName){
      const chosen = voices.find(v=>v.name===savedName);
      if(chosen) return chosen;
    }
  }catch(e){}
  // 2순위: 설정이 없으면 주요 영어권(미국/영국/호주/캐나다) 음성 중 남성으로 보이는 것을 자동 선택
  //         (인도식, 남아공식 등 잡다한 액센트는 자동 후보에서 제외해 일관된 발음을 우선함)
  const MAJOR_LANGS = ['en-us', 'en-gb', 'en-au', 'en-ca'];
  const majorVoices = voices.filter(v=>v.lang && MAJOR_LANGS.includes(v.lang.toLowerCase()));
  const enVoices = majorVoices.length ? majorVoices : voices.filter(v=>v.lang && v.lang.toLowerCase().startsWith('en'));
  const maleHints = ['male','daniel','alex','david','fred','aaron','tom','james','oliver','arthur','eddy'];
  const male = enVoices.find(v=> maleHints.some(h=>v.name.toLowerCase().includes(h)));
  return male || enVoices[0] || voices[0] || null;
}
// 구동사 제목에 쓰인 '~'는 카드마다 실제로 가리키는 대상(사람/사물/행동)이 달라서
// 일괄 치환하면 부정확할 수 있음(예: SET ~ AHEAD의 '~'는 시계이지 사람이 아님).
// 뜻을 직접 확인해 정확한 단어로 매핑해둔 사전을 우선 사용하고,
// 목록에 없는 새로운 패턴은 일반 규칙(사람=someone, ~ING=something)으로 대체함.
const SPEECH_OVERRIDES = {
  // p.1-31
  "STOP ~ FROM ~ING": "Stop someone from something",
  "SET ~ AHEAD": "Set the clock ahead",
  "TAKE ~ UNDER ONE'S WING": "Take someone under one's wing",
  "LET ~ HAVE IT": "Let someone have it",
  "MAKE ~ BREAKFAST / GET ~ READY": "Make someone breakfast, get someone ready",
  "GET ON ~ ABOUT": "Get on someone about something",
  "GET DONE ~ING": "Get done something",
  // p.32-59
  "CATCH ~ RED-HANDED": "Catch someone red-handed",
  "MARCH ~ UP TO": "March someone up to",
  "GO AROUND (~ING)": "Go around doing something",
  "BRING ~ IN ON": "Bring someone in on something",
  // p.60-95
  "HAVE ~ IN THE BAG": "Have it in the bag",
  "PAY ~ BACK": "Pay someone back",
  // p.96-119
  "KEEP ~ MOVING": "Keep something moving",
  "KEEP ~ SHUT": "Keep something shut",
  "DEFLECT ~ OVER TO": "Deflect something over to",
  "TOSS ~ IN THE TRASH": "Toss something in the trash",
  "HOOK ~ UP": "Hook someone up",
  "TALK ~ INTO": "Talk someone into",
  "GIVE ~ AWAY": "Give something away",
  // p.120-151
  "EAT ~ UP": "Eat it up",
  "SHAKE ~ OFF": "Shake it off",
  "CRACK ~ UP": "Crack someone up",
  "TICK ~ OFF": "Tick someone off",
  // p.152-179
  "BLOCK ~ IN": "Block something in",
  "GIVE ~ THE AXE": "Give someone the axe",
  "TURN ~ IN": "Turn something in",
  "SLIP ~ UNDER": "Slip something under",
  // p.180-217
  "RAT ~ OUT": "Rat someone out",
  "SELL ~ OUT": "Sell someone out",
  "WAIT ~ OUT": "Wait it out",
  "FOIL ~ PLAN": "Foil someone's plan",
  "EGG ~ ON": "Egg someone on",
};
function cleanForSpeech(text){
  if(!text) return text;
  if(SPEECH_OVERRIDES[text]) return SPEECH_OVERRIDES[text];
  return text
    .replace(/~ING\b/gi, 'something') // '~ING'는 동명사 빈칸이므로 자연스럽게 'something'으로 읽음
    .replace(/~/g, 'someone')         // 그 외 '~'는 목적어 빈칸이므로 'someone'으로 읽음 (정확한 매핑이 없을 때의 기본값)
    .replace(/\s+/g, ' ')             // 치환 과정에서 생긴 중복 공백 정리
    .trim();
}
function speakText(text, btn){
  if(!text) return;
  if(!('speechSynthesis' in window)){
    showToast('이 기기/브라우저는 음성 읽기를 지원하지 않아요');
    return;
  }
  speechSynthesis.cancel(); // 이전에 읽던 것 중단
  const utter = new SpeechSynthesisUtterance(cleanForSpeech(text));
  utter.lang = 'en-US';
  utter.rate = 0.95;
  if(!_ttsVoice) _ttsVoice = _pickVoice();
  if(_ttsVoice) utter.voice = _ttsVoice;
  if(btn) btn.classList.add('speaking');
  utter.onend = ()=>{ if(btn) btn.classList.remove('speaking'); };
  utter.onerror = ()=>{ if(btn) btn.classList.remove('speaking'); };
  speechSynthesis.speak(utter);
}
// 일부 브라우저는 음성 목록이 비동기로 늦게 로드되므로 준비되는 대로 다시 선택
if('speechSynthesis' in window){
  speechSynthesis.onvoiceschanged = ()=>{ _ttsVoice = _pickVoice(); };
}
function speakBtn(text, ev){
  if(ev) ev.stopPropagation();
  speakText(text, ev ? ev.currentTarget : null);
}

/* ── localStorage 진도 저장/불러오기 ── */
const SAVE_KEY = 'wimpykid_progress_v1::p1-31';

function saveProgress(){
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      flashIdx: idx,
      flashOrder: order,
      wIdx: wIdx,
      wOrder: wOrder,
      wFeedback: wFeedback,
      quizWrong: [...quizWrong],
      writeWrong: [...writeWrong],
      bookmarked: [...bookmarked],
    }));
  } catch(e){ /* 저장 실패 시 무시 */ }
}

function loadProgress(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const p = JSON.parse(raw);
    idx       = p.flashIdx  ?? 0;
    order     = p.flashOrder ?? [...Array(58).keys()];
    wIdx      = p.wIdx      ?? 0;
    wOrder    = p.wOrder    ?? [...Array(58).keys()];
    wFeedback = p.wFeedback ?? {};
    quizWrong = new Set(p.quizWrong ?? []);
    writeWrong= new Set(p.writeWrong ?? []);
    bookmarked= new Set(p.bookmarked ?? []);
    return true;
  } catch(e){ return false; }
}

function resetProgress(){
  if(!confirm('진도를 초기화할까요?\n플래시카드 위치, 작문 첨삭, 오답노트가 모두 삭제됩니다.')) return;
  localStorage.removeItem(SAVE_KEY);
  idx=0; order=[...Array(58).keys()]; flipped=false;
  wIdx=0; wOrder=[...Array(58).keys()]; wFeedback={};
  quizWrong=new Set(); writeWrong=new Set(); bookmarked=new Set();
  mode='flash';
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.getAttribute('onclick')===`setMode('flash')`));
  showToast('✅ 진도가 초기화됐어요!');
  render();
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--dark);color:var(--yellow);font-family:\'Nanum Gothic\',sans-serif;font-size:0.82rem;font-weight:700;padding:10px 22px;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:9999;opacity:0;transition:opacity .3s;';
    document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.opacity='0';},2000);
}

}

function toggleBookmark(num, ev){
  if(ev) ev.stopPropagation();
  const wasOn = bookmarked.has(num);
  if(wasOn) bookmarked.delete(num); else bookmarked.add(num);
  saveProgress();
  updateBadges();
  document.querySelectorAll(`.bm-star[data-num="${num}"]`).forEach(s=>s.classList.toggle('on', bookmarked.has(num)));
  if(mode==='bookmark' && wasOn){
    showToast('별표를 해제했어요. 다음 카드로 넘어가면 목록에서 빠져요.');
  }
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.tab').forEach(t=>{
    const isActive = t.getAttribute('onclick') === `setMode('${m}')`;
    t.classList.toggle('active', isActive);
  });
  if(m==='quiz'){qOrder=sh([...Array(58).keys()]);qIdx=0;score={c:0,w:0};}
  if(m==='write'&&wOrder.length===0){wOrder=[...Array(58).keys()];}
  if(m==='flash'){flipped=false;}
  if(m==='quizReview'){reviewQOrder=sh([...quizWrong]);reviewQIdx=0;reviewScore={c:0,w:0};}
  if(m==='writeReview'){reviewWOrder=[...writeWrong];reviewWIdx=0;}
  if(m==='bookmark'){bmOrder=[...bookmarked];bmIdx=0;}
  render();
}

function updProg(){
  let cur, total, rightLabel='';
  if(mode==='list'){cur=58;total=58;}
  else if(mode==='flash'){cur=idx+1;total=58;}
  else if(mode==='quiz'){cur=Math.min(qIdx+1,58);total=58;rightLabel=`✅ ${score.c}  ❌ ${score.w}`;}
  else if(mode==='write'){cur=wIdx+1;total=58;}
  else if(mode==='quizReview'){total=Math.max(reviewQOrder.length,1);cur=Math.min(reviewQIdx+1,total);rightLabel=`✅ ${reviewScore.c}  ❌ ${reviewScore.w}`;}
  else if(mode==='writeReview'){total=Math.max(reviewWOrder.length,1);cur=Math.min(reviewWIdx+1,total);}
  else if(mode==='bookmark'){total=Math.max(bmOrder.length,1);cur=Math.min(bmIdx+1,total);}
  const pct=Math.round(cur/total*100);
  document.getElementById('prog-label').textContent=mode==='list'
    ? (listFilter.trim() ? `검색결과 ${CARDS.filter(c=>c.verb.toLowerCase().includes(listFilter.trim().toLowerCase())||c.meaning.toLowerCase().includes(listFilter.trim().toLowerCase())).length}개` : `전체 58개`)
    : `${cur} / ${total}`;
  document.getElementById('prog-right').textContent=rightLabel;
  document.getElementById('prog-fill').style.width=pct+'%';
  updateBadges();
}

function render(){
  updProg();
  const el=document.getElementById('main');
  if(mode==='flash')renderFlash(el);
  else if(mode==='quiz')renderQuiz(el);
  else if(mode==='write')renderWrite(el);
  else if(mode==='quizReview')renderQuizReview(el);
  else if(mode==='writeReview')renderWriteReview(el);
  else if(mode==='bookmark')renderBookmark(el);
  else renderList(el);
}

function doWriteShuffle(){
  // 카드 번호(num) 기준으로 "다 푼 카드(1·2번 모두 첨삭 완료)"와 "안 푼 카드"를 구분
  const feedbackByNum = {};
  Object.keys(wFeedback).forEach(oldIdx=>{
    const num = wOrder[oldIdx];
    if(num!==undefined) feedbackByNum[num] = wFeedback[oldIdx];
  });
  const isDone = (num) => {
    const fb = feedbackByNum[num];
    return !!(fb && fb.fb1 && fb.fb2);
  };

  // 1) 다 푼 카드는 지금 순서(wOrder) 그대로의 위치를 유지
  // 2) 안 푼 카드만 따로 모아서 섞은 뒤, 원래 비어있던 자리(안 푼 카드 자리)에 다시 채워넣음
  const donePositions = [];   // [{pos, num}]
  const undoneNums = [];
  wOrder.forEach((num,pos)=>{
    if(isDone(num)) donePositions.push({pos, num});
    else undoneNums.push(num);
  });
  sh(undoneNums);

  const newOrder = new Array(58).fill(null);
  donePositions.forEach(({pos,num})=>{ newOrder[pos] = num; });
  let ui = 0;
  for(let pos=0; pos<58; pos++){
    if(newOrder[pos]===null){ newOrder[pos] = undoneNums[ui++]; }
  }
  wOrder = newOrder;

  const newFeedback = {};
  wOrder.forEach((num,newIdx)=>{
    if(feedbackByNum[num]!==undefined) newFeedback[newIdx] = feedbackByNum[num];
  });
  wFeedback = newFeedback;
  // 현재 보던 위치는 유지 (처음으로 돌아가지 않음)
  saveProgress();
  showToast('🔀 안 푼 문제만 섞었어요! (푼 답은 그대로예요)');
  render();
}

function checkWrite(cardIdx, qNum){
  const c = CARDS[wOrder[cardIdx]];
  const inputEl = document.getElementById('wi'+qNum);
  const userText = inputEl ? inputEl.value.trim() : '';
  if(!userText){alert('먼저 영어 문장을 써주세요!');return;}

  const modelAns = qNum===1 ? c.wa1 : c.wa2;

  if(!wFeedback[cardIdx]) wFeedback[cardIdx]={};
  if(qNum===1){wFeedback[cardIdx].input1=userText;delete wFeedback[cardIdx].draft1;} else {wFeedback[cardIdx].input2=userText;delete wFeedback[cardIdx].draft2;}

  const result = buildFeedback(userText, modelAns);
  if(qNum===1){wFeedback[cardIdx].fb1=result.html;wFeedback[cardIdx].err1=result.hasError;}
  else {wFeedback[cardIdx].fb2=result.html;wFeedback[cardIdx].err2=result.hasError;}

  // 오답노트 갱신: 1번 또는 2번 중 하나라도 틀리면 포함, 둘 다 맞으면 졸업
  const fb=wFeedback[cardIdx];
  const stillWrong = fb.err1 || fb.err2;
  if(stillWrong) writeWrong.add(c.num);
  else if(fb.fb1!==undefined && fb.fb2!==undefined) writeWrong.delete(c.num);

  saveProgress();
  render();
}

function normalize(str){
  return str
    .toLowerCase()
    .replace(/[\u2018\u2019]/g, "'")       // 스마트 따옴표(') 통일
    .replace(/[^a-z0-9'\s]/g, ' ')          // 문장부호·대시 등은 공백으로 치환 (단어 붙어버리는 것 방지)
    .replace(/\s+/g, ' ')                   // 연속 공백 → 한 칸으로
    .trim();
}

function buildFeedback(userRaw, modelRaw){
  const user = normalize(userRaw);
  const model = normalize(modelRaw);

  // Perfect match
  if(user === model){
    return {hasError:false, html:`<span style="color:#27500a;font-weight:800;">✅ 완벽해요!</span>
    <div class="fb-label" style="margin-top:8px">모범 답안</div>
    <div class="correct-ans">${modelRaw}</div>`};
  }

  // Word-level diff
  const uWords = user.split(/\s+/);
  const mWords = model.split(/\s+/);
  const mRawWords = modelRaw.split(/\s+/);

  // LCS-based diff
  const m = uWords.length, n = mWords.length;
  const dp = Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j] = uWords[i-1]===mWords[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j],dp[i][j-1]);

  // Traceback
  let i=m, j=n, diff=[];
  while(i>0||j>0){
    if(i>0&&j>0&&uWords[i-1]===mWords[j-1]){
      diff.unshift({type:'ok', word:mRawWords[j-1]});i--;j--;
    } else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){
      diff.unshift({type:'add', word:mRawWords[j-1]});j--;
    } else {
      diff.unshift({type:'del', word:uWords[i-1]});i--;
    }
  }

  const hasError = diff.some(d=>d.type!=='ok');
  let diffHtml = diff.map(d=>{
    if(d.type==='ok') return `<span style="color:#27500a">${d.word}</span>`;
    if(d.type==='del') return `<del>${d.word}</del>`;
    if(d.type==='add') return `<ins>${d.word}</ins>`;
  }).join(' ');

  return {hasError, html:`<span style="color:#e63946;font-weight:800;">❌ 수정이 필요해요</span>
  <div class="fb-label" style="margin-top:8px">내가 쓴 문장 vs 모범 답안</div>
  <div style="line-height:2;font-size:0.82rem">${diffHtml}</div>
  <div class="fb-label" style="margin-top:8px">모범 답안</div>
  <div class="correct-ans">${modelRaw}</div>
  <div style="font-size:0.7rem;color:var(--muted);margin-top:4px"><del>빨간색</del> = 내가 쓴 것 &nbsp; <ins>노란색</ins> = 빠진 것 &nbsp; <span style="color:#27500a">초록색</span> = 맞은 것</div>`};
}

function saveDraft(){
  // 정답보기를 누르기 전, textarea에 입력 중이던 내용을 임시 저장해 이동 시 유실 방지
  if(!wFeedback[wIdx]) wFeedback[wIdx]={};
  const fb = wFeedback[wIdx];
  const wi1 = document.getElementById('wi1');
  const wi2 = document.getElementById('wi2');
  if(wi1 && !fb.fb1 && wi1.value.trim()) fb.draft1 = wi1.value;
  if(wi2 && !fb.fb2 && wi2.value.trim()) fb.draft2 = wi2.value;
}
function wPrev(){if(wIdx>0){saveDraft();wIdx--;saveProgress();render();}}
function wNext(){if(wIdx<57){saveDraft();wIdx++;saveProgress();render();}}

function renderWriteReview(el){
  if(reviewWOrder.length===0){
    el.innerHTML=`<div class="result">
      <div class="result-emoji">🎉</div>
      <div class="result-title">오답노트가 비어있어요!</div>
      <div class="result-sub">작문에서 수정이 필요했던 문장이 여기 모여요</div>
      <button class="retry-btn" onclick="setMode('write')">작문 풀러 가기</button>
    </div>`;return;
  }
  if(reviewWIdx>=reviewWOrder.length){
    el.innerHTML=`<div class="result">
      <div class="result-emoji">🏁</div>
      <div class="result-title">오답 복습 완료!</div>
      <div class="result-sub">남은 오답 ${writeWrong.size}개</div>
      ${writeWrong.size?`<button class="retry-btn" style="background:var(--red);" onclick="setMode('writeReview')">남은 오답 다시 쓰기</button>`:`<button class="retry-btn" onclick="setMode('write')">전체 작문으로</button>`}
    </div>`;return;
  }
  const cardNum = reviewWOrder[reviewWIdx];
  const c = CARDS[cardNum-1];
  // wFeedback의 key는 wOrder 인덱스 기준이라, 일반 모드(원래 순서)일 때의 인덱스를 사용
  const origIdx = wOrder.indexOf(cardNum-1);
  const fb = (origIdx>=0 ? wFeedback[origIdx] : null) || {};
  el.innerHTML=`
  <div style="background:var(--card-bg);border-radius:18px;border:1.5px solid var(--border);padding:18px 18px 14px;margin-bottom:12px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <span style="font-family:'Bangers',cursive;font-size:1rem;color:var(--yellow);background:var(--dark);padding:2px 10px;border-radius:20px;">${String(c.num).padStart(2,'0')}</span>
      <span style="font-family:'Black Han Sans',sans-serif;font-size:1.1rem;color:var(--dark);">${c.verb}</span>
      <span style="font-size:0.72rem;color:var(--muted);margin-left:auto;">${c.page}</span>
    </div>
    <div style="font-size:0.82rem;font-weight:700;color:var(--red);margin-bottom:10px;">💬 ${c.meaning} — ${c.sub}</div>
    <div class="writing-section">
      ${fb.err1?`<div class="writing-item">
        <div class="wq">${c.wq1}</div>
        <textarea class="w-input" id="rwi1" placeholder="다시 영어로 써보세요..." ${fb.reFb1?'disabled':''}>${fb.reInput1||''}</textarea>
        ${fb.reFb1
          ? `<div class="feedback-box">${fb.reFb1}</div>`
          : `<button class="check-btn" onclick="checkReviewWrite(${cardNum},1)">✅ 정답보기</button>`}
        <div style="font-size:0.7rem;color:var(--muted);margin-top:6px;">이전 시도: ${fb.input1||''}</div>
      </div>`:''}
      ${fb.err2?`<div class="writing-item">
        <div class="wq">${c.wq2}</div>
        <textarea class="w-input" id="rwi2" placeholder="다시 영어로 써보세요..." ${fb.reFb2?'disabled':''}>${fb.reInput2||''}</textarea>
        ${fb.reFb2
          ? `<div class="feedback-box">${fb.reFb2}</div>`
          : `<button class="check-btn" onclick="checkReviewWrite(${cardNum},2)">✅ 정답보기</button>`}
        <div style="font-size:0.7rem;color:var(--muted);margin-top:6px;">이전 시도: ${fb.input2||''}</div>
      </div>`:''}
      ${(!fb.err1 && !fb.err2 && (fb.reFb1||fb.reFb2||fb.fb1!==undefined))?`<div style="text-align:center;padding:14px;color:var(--correct);font-weight:800;font-size:0.88rem;">🎉 이 카드는 완벽해요! 오답노트에서 졸업했어요.</div>`:''}
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn" onclick="reviewWPrev()" ${reviewWIdx===0?'disabled':''}>◀ 이전</button>
    <button class="nav-btn primary" onclick="reviewWNext()">다음 ▶</button>
  </div>`;
}

function checkReviewWrite(cardNum, qNum){
  const c = CARDS[cardNum-1];
  const inputEl = document.getElementById('rwi'+qNum);
  const userText = inputEl ? inputEl.value.trim() : '';
  if(!userText){alert('먼저 영어 문장을 써주세요!');return;}
  const modelAns = qNum===1 ? c.wa1 : c.wa2;
  const result = buildFeedback(userText, modelAns);

  // 원래 wFeedback에 재시도 결과를 별도 필드(reFb/reInput)로 저장 → 해당 문항 칸 안에 바로 표시
  const origIdx = wOrder.indexOf(cardNum-1);
  if(origIdx>=0){
    if(!wFeedback[origIdx]) wFeedback[origIdx]={};
    const fb = wFeedback[origIdx];
    if(qNum===1){fb.reInput1=userText;fb.reFb1=result.html;fb.err1=result.hasError;}
    else {fb.reInput2=userText;fb.reFb2=result.html;fb.err2=result.hasError;}
    if(!fb.err1 && !fb.err2) writeWrong.delete(cardNum);
  }
  saveProgress();
  updateBadges();
  render();
}

function reviewWPrev(){if(reviewWIdx>0){reviewWIdx--;render();}}
function reviewWNext(){reviewWIdx++;render();}

function renderBookmark(el){
  if(bmOrder.length===0){
    el.innerHTML=`<div class="result">
      <div class="result-emoji">🔖</div>
      <div class="result-title">북마크가 비어있어요!</div>
      <div class="result-sub">플래시카드의 별 아이콘을 눌러 안 외워지는 구동사를 모아보세요</div>
      <button class="retry-btn" onclick="setMode('flash')">플래시카드로 가기</button>
    </div>`;return;
  }
  if(bmIdx>=bmOrder.length){
    el.innerHTML=`<div class="result">
      <div class="result-emoji">🏁</div>
      <div class="result-title">북마크 끝까지 봤어요!</div>
      <div class="result-sub">현재 북마크 ${bookmarked.size}개</div>
      <button class="retry-btn" onclick="setMode('bookmark')">처음부터 다시 보기</button>
    </div>`;return;
  }
  const cardNum = bmOrder[bmIdx];
  const c = CARDS[cardNum-1];
  el.innerHTML=`
  <div class="card-scene" onclick="doFlip()">
    <div class="card-num-row">${bmStarSVG(c.num)}<span class="card-num">${String(c.num).padStart(2,'0')}</span></div>
    <span class="card-page">${c.page}</span>
    <div class="card-inner${flipped?' flipped':''}" id="ci">
      <div class="card-face">
        <div class="card-verb">${c.verb} ${speakBtnSVG(c.verb,'verb-speak')}</div>
        <div class="card-tap">탭해서 뜻 확인 👆</div>
      </div>
      <div class="card-face card-back">
        <div class="card-meaning">${c.meaning}</div>
        <div class="card-sub">${c.sub}</div>
        ${c.ex1_en?`<div class="card-ex">${c.ex1_en} ${speakBtnSVG(c.ex1_en)}</div><div class="card-ko">${c.ex1_ko}</div>`:''}
        ${c.ex2_en?`<div class="card-ex">${c.ex2_en} ${speakBtnSVG(c.ex2_en)}</div><div class="card-ko">${c.ex2_ko}</div>`:''}
        ${c.quote?`<div class="quote-box"><div class="quote-text">"${c.quote}" ${speakBtnSVG(c.quote)}</div>${c.quoteKo?`<div style="font-size:0.72rem;color:#999;margin-top:5px;font-family:'Nanum Gothic',sans-serif;line-height:1.5;">"${c.quoteKo}"</div>`:''}</div>`:''}
      </div>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn" onclick="bmPrev()" ${bmIdx===0?'disabled':''}>◀ 이전</button>
    <button class="nav-btn" onclick="doFlip()">뒤집기</button>
    <button class="nav-btn primary" onclick="bmNext()">다음 ▶</button>
  </div>`;
}
function bmPrev(){if(bmIdx>0){bmIdx--;flipped=false;render();}}
function bmNext(){
  flipped=false;
  // 방금 보고 있던 카드가 별 해제된 상태라면 목록에서 제거 (이동 전 인덱스 기준)
  const leavingNum = bmOrder[bmIdx];
  if(leavingNum!==undefined && !bookmarked.has(leavingNum)){
    bmOrder.splice(bmIdx,1);
  } else {
    bmIdx++;
  }
  if(bmIdx>bmOrder.length) bmIdx=bmOrder.length;
  render();
}

function buildListItemsHtml(){
  const q = (listFilter||'').trim().toLowerCase();
  const filtered = q
    ? CARDS.filter(c => c.verb.toLowerCase().includes(q) || c.meaning.toLowerCase().includes(q))
    : CARDS;
  return filtered.length
    ? filtered.map(c=>`
  <div class="list-item" onclick="goFlash(${c.num-1})">
    <span class="li-num">${String(c.num).padStart(2,'0')}</span>
    ${speakBtnSVG(c.verb)}
    <span class="li-star">${bookmarked.has(c.num)?'⭐':''}</span>
    <span class="li-verb">${c.verb}</span>
    <span class="li-meaning">${c.meaning}</span>
    <span class="li-page">${c.page}</span>
  </div>`).join('')
    : `<div class="list-empty">🔍 "${listFilter}"에 해당하는 구동사가 없어요</div>`;
}
function renderList(el){
  // 검색창(input)은 한 번만 그리고, 이후 타이핑마다 다시 그리지 않음
  // (input을 매번 재생성하면 한글 IME 조합이 끊겨 자음/모음이 분리되어 보이는 문제가 생김)
  el.innerHTML = `<input type="text" class="list-search" id="list-search-input" placeholder="🔍 구동사 또는 뜻 검색..." value="${(listFilter||'').replace(/"/g,'&quot;')}">
  <div id="list-items">${buildListItemsHtml()}</div>`;
  const inputEl = document.getElementById('list-search-input');
  if(inputEl){
    inputEl.oninput = (e)=>{
      listFilter = e.target.value;
      updateListItemsOnly();
      updProg();
    };
  }
}
function updateListItemsOnly(){
  // 카드 목록 부분만 갱신. 검색창은 절대 건드리지 않아 IME 조합이 끊기지 않음
  const itemsEl = document.getElementById('list-items');
  if(itemsEl) itemsEl.innerHTML = buildListItemsHtml();
}
function goFlash(i){
  mode='flash';
  // order가 섞여있을 수 있으므로, "카드 인덱스 i"가 order 배열의 어느 위치에 있는지 찾아서 이동
  const pos = order.indexOf(i);
  idx = pos>=0 ? pos : i;
  flipped=false;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.getAttribute('onclick')===`setMode('flash')`));
  saveProgress();render();
}

const _resumed = loadProgress();
render();
if(_resumed) showToast(`📌 이어서 시작! (오답노트 퀴즈 ${quizWrong.size}개 · 작문 ${writeWrong.size}개)`);
</script>
