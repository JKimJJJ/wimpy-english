<html lang="ko">
<head>

<title>WIMPY KID Book 1</title>

<meta property="og:description" content="구동사 학습 노트 — 비매품 · 개인 학습 전용 자료">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="WIMPY KID Book 1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5c842">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Black+Han+Sans&family=Nanum+Gothic:wght@400;700;800&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f0e8;
  --paper:#fffdf7;
  --dark:#1a1d2e;
  --yellow:#f5c842;
  --red:#e63946;
  --green:#52b788;
  --muted:#8a8472;
  --border:#e0dbc8;
}
body{
  background:var(--bg);
  background-image:
    radial-gradient(circle at 1px 1px, rgba(26,29,46,0.06) 1px, transparent 0);
  background-size:22px 22px;
  font-family:'Nanum Gothic',sans-serif;
  min-height:100vh;
  padding:48px 16px 60px;
  color:var(--dark);
}
#app{max-width:480px;margin:0 auto;}

/* 좌상단 출처 / 우상단 배포 안내 — 스크롤해도 항상 고정, 휴대폰 상태바와 안 겹치게 여유 확보 */
.corner-tag{
  position:fixed;
  top:calc(env(safe-area-inset-top, 0px) + 38px);
  font-size:0.62rem;
  color:#aaa;
  font-family:'Nanum Gothic',sans-serif;
  z-index:1000;
  pointer-events:none;
  letter-spacing:0.1px;
  white-space:nowrap;
}
.corner-tag.left{left:14px;}
.corner-tag.right{right:14px;text-align:right;}
@media (max-width:360px){
  .corner-tag{font-size:0.56rem;}
}

/* ===== ICON-STYLE COVER (flat yellow badge, text only) ===== */
.icon-badge{
  background:var(--yellow);
  border-radius:32px;
  border:3px solid var(--dark);
  position:relative;
  padding:46px 26px 38px;
  box-shadow:8px 8px 0 rgba(26,29,46,0.14), 0 2px 0 var(--border);
  overflow:hidden;
  margin-bottom:30px;
  text-align:center;
}

.badge-tag{
  display:inline-block;
  background:var(--dark);
  color:var(--yellow);
  font-family:'Nanum Gothic',sans-serif;
  font-size:0.7rem;
  font-weight:800;
  padding:4px 14px;
  border-radius:20px;
  margin-bottom:18px;
  letter-spacing:0.5px;
}

.title-zone{text-align:center;margin-bottom:0;position:relative;z-index:1;}
.title-zone h1{
  font-family:'Bangers',cursive;
  font-size:3rem;
  color:var(--dark);
  letter-spacing:2px;
  line-height:1.05;
}
.title-zone h1 span{display:block;}
.title-zone .sub{
  font-family:'Nanum Gothic',sans-serif;
  font-weight:700;
  font-size:0.82rem;
  color:var(--dark);
  opacity:0.65;
  margin-top:12px;
  letter-spacing:0.2px;
}

.purpose-note{
  position:relative;
  z-index:1;
  margin-top:18px;
  padding-top:16px;
  border-top:1.5px dashed rgba(26,29,46,0.25);
}
.purpose-note .txt{
  font-family:'Nanum Gothic',sans-serif;
  font-size:0.72rem;
  font-weight:800;
  color:#8a1620;
  line-height:1.6;
}
.purpose-note .txt span{
  display:block;
  font-weight:400;
  opacity:0.6;
  font-size:0.66rem;
  margin-top:3px;
}


/* ===== SECTION LABEL ===== */
.section-label{
  font-family:'Nanum Gothic',sans-serif;
  font-size:0.85rem;
  font-weight:800;
  color:var(--dark);
  margin:0 4px 12px;
  display:flex;
  align-items:center;
  gap:8px;
}
.section-label-rule{
  flex:1;
  border-top:1.5px dashed var(--border);
}
.settings-btn{
  flex-shrink:0;
  width:30px;height:30px;
  border-radius:50%;
  border:1.5px solid var(--border);
  background:var(--paper);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  color:var(--muted);
  -webkit-tap-highlight-color:transparent;
  transition:transform .15s, border-color .15s, color .15s;
}
.settings-btn svg{width:16px;height:16px;}
.settings-btn:active{transform:scale(0.9) rotate(20deg);}
@media(hover:hover){
  .settings-btn:hover{border-color:var(--dark);color:var(--dark);}
}

/* ===== VOICE SETTINGS MODAL ===== */
.modal-backdrop{
  position:fixed;inset:0;
  background:rgba(26,29,46,0.45);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:2000;
  opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.modal-backdrop.open{opacity:1;pointer-events:auto;}
.voice-modal{
  background:var(--paper);
  width:100%;max-width:480px;
  border-radius:24px 24px 0 0;
  padding:22px 20px calc(22px + env(safe-area-inset-bottom, 0px));
  transform:translateY(100%);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  max-height:80vh;
  overflow-y:auto;
}
.modal-backdrop.open .voice-modal{transform:translateY(0);}
.voice-modal h3{
  font-family:'Black Han Sans',sans-serif;
  font-size:1.1rem;
  color:var(--dark);
  margin-bottom:4px;
}
.voice-modal .voice-modal-sub{
  font-size:0.74rem;
  color:var(--muted);
  margin-bottom:16px;
  line-height:1.5;
}
.voice-option{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;
  border:1.5px solid var(--border);
  border-radius:14px;
  margin-bottom:8px;
  cursor:pointer;
  transition:border-color .15s, background .15s;
}
.voice-option.selected{
  border-color:var(--dark);
  background:#fffbea;
}
.voice-option-radio{
  width:18px;height:18px;
  border-radius:50%;
  border:2px solid var(--border);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.voice-option.selected .voice-option-radio{border-color:var(--dark);}
.voice-option.selected .voice-option-radio::after{
  content:'';width:9px;height:9px;border-radius:50%;background:var(--dark);
}
.voice-option-info{flex:1;min-width:0;}
.voice-option-name{font-size:0.85rem;font-weight:800;color:var(--dark);}
.voice-option-lang{font-size:0.68rem;color:var(--muted);margin-top:1px;}
.voice-option-test{
  flex-shrink:0;
  width:30px;height:30px;
  border-radius:50%;
  border:none;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  color:var(--muted);
  -webkit-tap-highlight-color:transparent;
}
.voice-option-test svg{width:15px;height:15px;}
.voice-modal-empty{
  text-align:center;padding:24px 10px;
  color:var(--muted);font-size:0.82rem;line-height:1.6;
}
.voice-modal-close{
  display:block;width:100%;
  margin-top:14px;
  padding:13px;
  border-radius:14px;
  border:none;
  background:var(--dark);
  color:var(--yellow);
  font-family:'Nanum Gothic',sans-serif;
  font-weight:800;
  font-size:0.9rem;
  cursor:pointer;
}

/* ===== PAGE GROUP CARDS ===== */
.groups{display:flex;flex-direction:column;gap:12px;}
.group-card{
  background:var(--paper);
  border:1.5px solid var(--border);
  border-radius:16px;
  padding:16px 18px;
  display:flex;
  align-items:center;
  gap:14px;
  cursor:pointer;
  text-decoration:none;
  color:inherit;
  transition:transform .15s, box-shadow .15s, border-color .15s;
  position:relative;
}
.group-card:active{transform:scale(0.98);}
@media(hover:hover){
  .group-card:hover{border-color:var(--dark); box-shadow:3px 3px 0 var(--border);}
}
.group-card.locked{opacity:0.5; cursor:default;}
.group-card.locked:active{transform:none;}

.group-num{
  font-family:'Bangers',cursive;
  font-size:1.5rem;
  color:var(--dark);
  background:var(--yellow);
  width:46px; height:46px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  border:2px solid var(--dark);
}
.group-card.locked .group-num{background:var(--border);border-color:var(--muted);color:var(--muted);}

.group-info{flex:1;min-width:0;}
.group-pages{
  font-family:'Black Han Sans',sans-serif;
  font-size:1rem;
  color:var(--dark);
}
.group-meta{
  font-size:0.72rem;
  color:var(--muted);
  margin-top:3px;
}
.group-arrow{
  flex-shrink:0;
  width:38px; height:38px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:var(--red);
  border:2px solid var(--dark);
  box-shadow:2px 2px 0 rgba(26,29,46,0.18);
  transition:transform .15s, box-shadow .15s;
}
.group-arrow svg{ width:15px; height:15px; }
@media(hover:hover){
  .group-card:hover .group-arrow{ transform:translateX(2px); box-shadow:3px 3px 0 rgba(26,29,46,0.22); }
}
.group-card.locked .group-arrow{
  background:var(--border);
  border-color:var(--muted);
  box-shadow:none;
}
.group-card.locked .group-arrow svg{ width:16px; height:16px; }

.progress-pill{
  font-size:0.62rem;
  font-weight:800;
  padding:2px 9px;
  border-radius:20px;
  margin-top:6px;
  display:inline-block;
}
.progress-pill.done{background:#eaf3de;color:#27500a;}
.progress-pill.go{background:#fff0f1;color:var(--red);}

footer{
  text-align:center;
  margin-top:36px;
  font-family:'Nanum Gothic',sans-serif;
  font-size:0.74rem;
  font-weight:700;
  color:var(--muted);
  line-height:1.8;
}
</style>
</head>
<body>
<div class="corner-tag left">blog.naver.com/google135</div>
<div class="corner-tag right">무단 전재 및 재배포·유료 판매 금지</div>
<div id="app">

  <div class="icon-badge">
    <span class="badge-tag">📓 MY STUDY JOURNAL</span>

    <div class="title-zone">
      <h1><span>WIMPY KID</span></h1>
      <p class="sub">구동사 학습 노트 · Diary of a Wimpy Kid, Book 1</p>

    <div class="purpose-note">
      <div class="txt">🎓 비매품 · 개인 학습 전용 자료

      </div>

  <div class="section-label">📖 학습할 챕터를 선택하세요<span class="section-label-rule"></span>

      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>

  <div class="groups" id="groups"></div>

  <footer>
    탭해서 진도가 저장된 위치부터<br>이어서 학습할 수 있어요 ✍️
  </footer>
</div>

<div class="modal-backdrop" id="voice-modal-backdrop" onclick="if(event.target===this)closeVoiceSettings()">
  <div class="voice-modal">
    <h3>🔊 읽기 음성 설정</h3>
    <p class="voice-modal-sub">기기에 설치된 영어 음성 중 하나를 선택하세요. 모든 챕터에 동일하게 적용돼요.</p>
    <div id="voice-list"></div>
    <button class="voice-modal-close" onclick="closeVoiceSettings()">완료</button>
  </div>
</div>

<script>
// 페이지 그룹 정의 — file은 각 finish 버전 HTML 경로
const GROUPS = [
  { num:1, range:"p.1–31",   count:58, file:"wimpy_1_31_finish.html",   key:"wimpykid_progress_v1::p1-31",   ready:true },
  { num:2, range:"p.32–59",  count:40, file:"wimpy_32_59_finish.html",  key:"wimpykid_progress_v1::p32-59",  ready:true },
  { num:3, range:"p.60–95",  count:36, file:"wimpy_60_95_finish.html",  key:"wimpykid_progress_v1::p60-95",  ready:true },
  { num:4, range:"p.96–119", count:33, file:"wimpy_96_119_finish.html", key:"wimpykid_progress_v1::p96-119", ready:true },
  { num:5, range:"p.120–151",count:31, file:"wimpy_120_151_finish.html",key:"wimpykid_progress_v1::p120-151",ready:true },
  { num:6, range:"p.152–179",count:30, file:"wimpy_152_179_finish.html",key:"wimpykid_progress_v1::p152-179",ready:true },
  { num:7, range:"p.180–217",count:35, file:"wimpy_180_217_finish.html",key:"wimpykid_progress_v1::p180-217",ready:true },
];

function getProgressSummary(g){
  if(!g.ready) return null;
  try{
    const raw = localStorage.getItem(g.key);
    if(!raw) return null;
    const p = JSON.parse(raw);
    if(typeof p.flashIdx === 'number'){
      return { idx:p.flashIdx, total:g.count };
    }
  }catch(e){}
  return null;
}

function render(){
  const el = document.getElementById('groups');
  el.innerHTML = GROUPS.map(g=>{
    const prog = getProgressSummary(g);
    const pill = !g.ready
      ? ''
      : prog
        ? `<span class="progress-pill done">📍 ${prog.idx+1}/${prog.total} 이어하기</span>`
        : `<span class="progress-pill go">새로 시작</span>`;
    const inner = `
      <div class="group-num">${String(g.num).padStart(2,'0')}</div>
      <div class="group-info">
        <div class="group-pages">${g.range}</div>
        <div class="group-meta">${g.ready ? `구동사 ${g.count}개` : '준비 중'}</div>
        ${pill}
      </div>
      <div class="group-arrow">${g.ready
        ? `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 4L19 12L6 20V4Z" fill="#fffdf7" stroke="#fffdf7" stroke-width="1.2" stroke-linejoin="round"/></svg>`
        : `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="11" width="14" height="10" rx="2" fill="none" stroke="#8a8472" stroke-width="2" stroke-linejoin="round"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="#8a8472" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="16" r="1.4" fill="#8a8472"/></svg>`
      }</div>
    `;
    return g.ready
      ? `<a class="group-card" href="${g.file}">${inner}</a>`
      : `<div class="group-card locked">${inner}</div>`;
  }).join('');
}
/* ── 음성 설정 (모든 챕터가 공유) ── */
const VOICE_PREF_KEY = 'wimpykid_voice_pref_v1'; // 선택한 음성의 name을 저장

function getAvailableEnglishVoices(){
  if(!('speechSynthesis' in window)) return [];
  const allVoices = speechSynthesis.getVoices();

  // 0) Apple 기기에는 'en-US' 등 정상적인 언어 태그를 달고 있지만 실제로는
  //    효과음/장난용인 '노벨티(novelty)' 음성들이 섞여 있어 이름으로 직접 제외함
  //    (예: Bells, Boing, Zarvox, Trinoids — 정식 영어 음성이 아님)
  //    안드로이드(Google TTS 등)에서 보고된 테스트/내부용 음성 이름도 함께 제외함
  const NOVELTY_NAMES_EXACT = [
    // Apple 노벨티 음성 (고유한 이름이라 단어 단위로 매칭해도 안전)
    'albert','bad news','bahh','bells','boing','bubbles','cellos','deranged',
    'good news','hysterical','pipe organ','organ','trinoids','whisper','zarvox',
    'jester','wobble','rocko','superstar','grandma','grandpa',
    // 안드로이드/기타 TTS 엔진의 테스트·엔진 자체를 가리키는 이름
    'test','default','robot','espeak','festival','pico'
  ];
  // 단어 경계 기준으로 정확히 그 단어가 포함됐는지 검사 (예: 'Pico TTS'는 매칭, 'Roberto'는 매칭 안 됨)
  const isNovelty = (v) => {
    const n = v.name.trim();
    return NOVELTY_NAMES_EXACT.some(bad => new RegExp('\\b' + bad.replace(/\s+/g,'\\s+') + '\\b', 'i').test(n));
  };

  // 1) 주요 영어권 4개 지역만 남기고 인도식/남아공식 등 잡다한 액센트는 제외, 노벨티 음성도 함께 제외
  const MAJOR_LANGS = ['en-us', 'en-gb', 'en-au', 'en-ca'];
  let voices = allVoices.filter(v => v.lang && MAJOR_LANGS.includes(v.lang.toLowerCase()) && !isNovelty(v));

  // 1-1) 안드로이드는 기기에 내장된 음성(localService: true, 네트워크 불필요)과
  //      온라인에서 받아와야 하는 음성(localService: false)이 섞여 나올 수 있음.
  //      온라인 음성은 끊기거나 느릴 수 있어, 내장 음성이 하나라도 있으면 내장 음성만 보여줌
  const localOnes = voices.filter(v => v.localService !== false);
  if(localOnes.length) voices = localOnes;

  // 2) 같은 이름의 음성이 일반판/고품질판으로 중복 등록된 경우, 고품질만 남김
  //    (iOS는 음성 이름에 "Enhanced"/"Premium"이 붙거나, voiceURI에 'premium'이 포함되는 경우가 많음)
  const isHQ = (v) => /enhanced|premium/i.test(v.name) || /premium|enhanced/i.test(v.voiceURI||'');
  const byBaseName = {};
  voices.forEach(v=>{
    const base = v.name.replace(/\s*\(Enhanced\)|\s*\(Premium\)/gi, '').trim();
    const key = base + '|' + v.lang;
    if(!byBaseName[key] || (isHQ(v) && !isHQ(byBaseName[key]))){
      byBaseName[key] = v;
    }
  });
  voices = Object.values(byBaseName);

  // 3) 보기 좋게 미국식 -> 영국식 -> 호주식 -> 캐나다식 순서로, 그 안에서는 이름순 정렬
  const order = { 'en-us':0, 'en-gb':1, 'en-au':2, 'en-ca':3 };
  voices.sort((a,b)=>{
    const la = a.lang.toLowerCase(), lb = b.lang.toLowerCase();
    if(order[la] !== order[lb]) return order[la]-order[lb];
    return a.name.localeCompare(b.name);
  });

  return voices;
}

function renderVoiceList(){
  const listEl = document.getElementById('voice-list');
  const voices = getAvailableEnglishVoices();
  const savedName = localStorage.getItem(VOICE_PREF_KEY);

  if(!voices.length){
    listEl.innerHTML = `<div class="voice-modal-empty">⏳ 음성 목록을 불러오는 중이거나,<br>이 기기에서는 음성 읽기를 지원하지 않을 수 있어요.</div>`;
    return;
  }

  listEl.innerHTML = voices.map(v=>{
    const selected = savedName ? (v.name === savedName) : false;
    const langLabel = v.lang.toLowerCase().startsWith('en-us') ? '🇺🇸 미국식'
      : v.lang.toLowerCase().startsWith('en-gb') ? '🇬🇧 영국식'
      : v.lang.toLowerCase().startsWith('en-au') ? '🇦🇺 호주식'
      : v.lang.toLowerCase().startsWith('en-ca') ? '🇨🇦 캐나다식'
      : v.lang;
    const isHQ = /enhanced|premium/i.test(v.name) || /premium|enhanced/i.test(v.voiceURI||'');
    const hqBadge = isHQ ? ' <span style="color:#52b788;font-weight:800;">· 고품질</span>' : '';
    const cleanName = v.name.replace(/\s*\(Enhanced\)|\s*\(Premium\)/gi, '').trim();
    return `
    <div class="voice-option${selected?' selected':''}" data-voice-name="${v.name.replace(/"/g,'&quot;')}" onclick="selectVoice(this)">
      <div class="voice-option-radio"></div>
      <div class="voice-option-info">
        <div class="voice-option-name">${cleanName}</div>
        <div class="voice-option-lang">${langLabel}${hqBadge}</div>
      </div>
      <button class="voice-option-test" onclick="event.stopPropagation();testVoice('${v.name.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')" title="들어보기">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 5L6 9H2v6h4l5 4V5z"/>
          <path d="M15.5 8.5a5 5 0 0 1 0 7"/>
        </svg>
      </button>
    </div>`;
  }).join('');

  // 저장된 선택이 없으면(처음 설정) 첫 번째 음성을 기본 표시만 하고 저장은 사용자가 직접 고를 때 함
}

function selectVoice(el){
  const name = el.getAttribute('data-voice-name');
  localStorage.setItem(VOICE_PREF_KEY, name);
  document.querySelectorAll('.voice-option').forEach(o=>o.classList.toggle('selected', o===el));
}

function testVoice(name){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const voices = speechSynthesis.getVoices();
  const voice = voices.find(v=>v.name===name);
  const utter = new SpeechSynthesisUtterance('Hang out with your friends.');
  utter.lang = voice ? voice.lang : 'en-US';
  utter.rate = 0.95;
  if(voice) utter.voice = voice;
  speechSynthesis.speak(utter);
}

function openVoiceSettings(){
  document.getElementById('voice-modal-backdrop').classList.add('open');
  renderVoiceList();
}
function closeVoiceSettings(){
  document.getElementById('voice-modal-backdrop').classList.remove('open');
  if('speechSynthesis' in window) speechSynthesis.cancel();
}
if('speechSynthesis' in window){
  speechSynthesis.onvoiceschanged = ()=>{
    if(document.getElementById('voice-modal-backdrop').classList.contains('open')) renderVoiceList();
  };
}
/* ──────────────────────────────── */

render();
</script>
</body>
</html>
